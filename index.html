<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Care Visit Log Dashboard</title>
  <!-- Tailwind CSS CDN for instant styling -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-800">

  <!-- Header Navigation -->
  <header class="bg-indigo-700 text-white shadow-md">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold tracking-wide">Care Service Admin Portal</h1>
      <span class="text-xs bg-indigo-800 px-3 py-1 rounded-full text-indigo-200">Live API Connected</span>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">
    
    <!-- Controls Section: Filters & Refresh -->
    <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
      <h2 class="text-lg font-semibold text-slate-700 mb-4">Filter Visit History</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">Client Name</label>
          <input type="text" id="clientFilter" placeholder="e.g. John Smith" 
                 class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">Carer Name</label>
          <input type="text" id="carerFilter" placeholder="e.g. Sarah" 
                 class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="flex items-end gap-2">
          <button onclick="loadVisitLogs()" 
                  class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg text-sm transition">
            Apply Filters
          </button>
          <button onclick="resetFilters()" 
                  class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-medium px-4 py-2 rounded-lg text-sm transition">
            Reset
          </button>
        </div>
      </div>
    </section>

    <!-- Table Section -->
    <section class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center">
        <h3 class="font-semibold text-slate-700">Recent Visits</h3>
        <span id="recordCount" class="text-xs font-semibold text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full">0 Records Found</span>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm">
          <thead class="bg-slate-50 text-slate-500 border-b border-slate-200">
            <tr>
              <th class="py-3 px-6">Timestamp</th>
              <th class="py-3 px-6">Client Name</th>
              <th class="py-3 px-6">Carer Name</th>
              <th class="py-3 px-6">Location / Status</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="divide-y divide-slate-100">
            <tr>
              <td colspan="4" class="text-center py-6 text-slate-400">Loading visit logs...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- JavaScript Logic -->
  <script>
    // Live Function App Endpoint
    const API_URL = 'https://care-appcdfc-b5b2cabed9h5dwhp.centralus-01.azurewebsites.net/api/GetVisitHistory';

    async function loadVisitLogs() {
      const clientName = document.getElementById('clientFilter').value.trim();
      const carerName = document.getElementById('carerFilter').value.trim();
      const tbody = document.getElementById('tableBody');

      tbody.innerHTML = '<tr><td colspan="4" class="text-center py-6 text-slate-400">Fetching live logs...</td></tr>';

      let fetchUrl = API_URL;
      const params = new URLSearchParams();

      if (clientName) params.append('clientName', clientName);
      if (carerName) params.append('carerName', carerName);

      if (params.toString()) {
        fetchUrl += `?${params.toString()}`;
      }

      try {
        const response = await fetch(fetchUrl);
        const data = await response.json();

        if (data.success && data.logs) {
          document.getElementById('recordCount').innerText = `${data.count} Records Found`;
          
          if (data.logs.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-6 text-slate-400">No visits recorded yet.</td></tr>';
            return;
          }

          tbody.innerHTML = data.logs.map(log => `
            <tr class="hover:bg-slate-50 transition">
              <td class="py-3 px-6 font-mono text-xs text-slate-500">${new Date(log.Timestamp || Date.now()).toLocaleString()}</td>
              <td class="py-3 px-6 font-medium text-slate-800">${log.ClientName || 'N/A'}</td>
              <td class="py-3 px-6 text-slate-600">${log.CarerName || 'N/A'}</td>
              <td class="py-3 px-6">
                <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-emerald-100 text-emerald-800">
                  Completed
                </span>
              </td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = `<tr><td colspan="4" class="text-center py-6 text-red-500">Error: ${data.error || 'Failed to parse response'}</td></tr>`;
        }
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center py-6 text-red-500">Network Error: Unable to fetch data.</td></tr>`;
      }
    }

    function resetFilters() {
      document.getElementById('clientFilter').value = '';
      document.getElementById('carerFilter').value = '';
      loadVisitLogs();
    }

    // Load data automatically on page open
    window.onload = loadVisitLogs;
  </script>
</body>
</html>

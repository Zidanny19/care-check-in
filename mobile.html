<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Care Visit Check-In</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between p-4 font-sans">

  <!-- App Header -->
  <header class="text-center py-4 border-b border-slate-800">
    <h1 class="text-xl font-bold text-indigo-400">Care Check-In</h1>
    <p class="text-xs text-slate-400 mt-1">Tap NFC Tag or Log Visit Manually</p>
  </header>

  <!-- Main Action Area -->
  <main class="flex-1 flex flex-col justify-center items-center max-w-md mx-auto w-full py-6">

    <!-- Status Alert Card -->
    <div id="statusBox" class="hidden w-full mb-6 p-4 rounded-xl text-center text-sm font-medium"></div>

    <!-- Check-in Form -->
    <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 w-full space-y-4">
      
      <div>
        <label class="block text-xs font-semibold text-slate-300 mb-1">Carer Name</label>
        <input type="text" id="carerName" placeholder="Enter your name" 
               class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-white">
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-300 mb-1">Client Name</label>
        <input type="text" id="clientName" placeholder="Enter client's name" 
               class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-white">
      </div>

      <!-- NFC Scan Button -->
      <button id="nfcBtn" onclick="startNFCScan()" 
              class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition flex items-center justify-center gap-2 text-base">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Scan NFC Tag
      </button>

      <div class="relative flex py-2 items-center">
        <div class="flex-grow border-t border-slate-700"></div>
        <span class="flex-shrink mx-4 text-xs text-slate-500 uppercase tracking-widest">or</span>
        <div class="flex-grow border-t border-slate-700"></div>
      </div>

      <!-- Manual Submit Button -->
      <button onclick="submitCheckIn('Manual Check-In')" 
              class="w-full bg-slate-700 hover:bg-slate-600 active:bg-slate-800 text-slate-200 font-medium py-3 rounded-xl transition text-sm">
        Log Visit Manually
      </button>

    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center py-3 text-xs text-slate-600">
    &copy; Domiciliary Care Visit System
  </footer>

  <!-- JavaScript Logic -->
  <script>
    const LOG_API_URL = 'https://care-appcdfc-b5b2cabed9h5dwhp.centralus-01.azurewebsites.net/api/LogVisits';

    function showStatus(message, isError = false) {
      const box = document.getElementById('statusBox');
      box.classList.remove('hidden', 'bg-emerald-900/50', 'text-emerald-300', 'border-emerald-700', 'bg-red-900/50', 'text-red-300', 'border-red-700');
      
      if (isError) {
        box.classList.add('bg-red-900/50', 'text-red-300', 'border', 'border-red-700');
      } else {
        box.classList.add('bg-emerald-900/50', 'text-emerald-300', 'border', 'border-emerald-700');
      }
      box.innerText = message;
    }

    async function submitCheckIn(sourceTag = 'NFC') {
      const carerName = document.getElementById('carerName').value.trim();
      const clientName = document.getElementById('clientName').value.trim();

      if (!carerName || !clientName) {
        showStatus('Please enter both Carer and Client names.', true);
        return;
      }

      showStatus('Submitting visit log...');

      try {
        const response = await fetch(LOG_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            carerName: carerName,
            clientName: clientName,
            location: sourceTag
          })
        });

        const data = await response.json();

        if (response.ok) {
          showStatus(`✓ Visit logged successfully for ${clientName}!`);
        } else {
          showStatus(`Error: ${data.message || 'Failed to record visit.'}`, true);
        }
      } catch (err) {
        showStatus('Network error: Could not reach check-in server.', true);
      }
    }

    async function startNFCScan() {
      if ('NDEFReader' in window) {
        try {
          const ndef = new NDEFReader();
          await ndef.scan();
          showStatus('NFC Ready! Hold your phone near the tag...');

          ndef.addEventListener("reading", ({ serialNumber }) => {
            showStatus(`NFC Tag Detected (${serialNumber})! Processing...`);
            submitCheckIn(`NFC Tag: ${serialNumber}`);
          });

          ndef.addEventListener("readingerror", () => {
            showStatus("Failed to read NFC tag. Try again.", true);
          });
        } catch (error) {
          showStatus(`NFC Error: ${error.message || 'Permission denied'}`, true);
        }
      } else {
        showStatus('Web NFC is not supported on this device/browser. Using manual log instead.');
        submitCheckIn('Manual (NFC Unsupported)');
      }
    }
  </script>
</body>
</html>
